<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f7;--card:#fff;--h1:#2c2c2e;--h2:#3a3a3c;
  --ac:#ff9f0a;--acs:#fff9f0;
  --t1:#1c1c1e;--t2:#636366;--t3:#8e8e93;
  --ib:#d1d1d6;--ibg:#f5f5f7;
  --nav:rgba(28,28,30,0.97);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--t1);}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);}
@media(min-width:768px){
  body{background:#e5e5ea;}
  #app{margin:32px auto;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.18);min-height:auto;}
  .bnav{border-radius:0 0 24px 24px;}
}
.bebas{font-family:'Bebas Neue',cursive;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.cani{animation:fadeUp .28s ease both;}
.fchip{transition:transform .15s;cursor:default;}.fchip:hover{transform:scale(1.06);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(8px);}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:28px 22px 40px;max-height:90vh;overflow-y:auto;}
.inp{width:100%;border:1px solid var(--ib);border-radius:12px;padding:11px 14px;font-size:14px;font-family:inherit;background:var(--ibg);color:var(--t1);outline:none;transition:border-color .15s;-webkit-appearance:none;box-sizing:border-box;}
.inp:focus{border-color:var(--ac);}
.lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:6px;margin-top:14px;}
.btnp{width:100%;background:var(--h1);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:18px;}
.btns{background:var(--card);color:var(--t2);border:1px solid var(--ib);border-radius:12px;padding:11px 18px;font-size:13px;font-family:inherit;cursor:pointer;}
.star{font-size:18px;cursor:pointer;color:#d1d1d6;transition:color .1s;display:inline-block;line-height:1;}.star.on{color:#ff9f0a;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--nav);border-top:0.5px solid rgba(255,255,255,0.08);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);max-width:480px;margin:0 auto;}
@media(min-width:768px){.bnav{left:50%;transform:translateX(-50%);right:auto;width:480px;}}
.nbtn{flex:1;background:none;border:none;color:#636366;padding:10px 0 13px;font-family:inherit;font-size:11px;cursor:pointer;border-top:2px solid transparent;}
.nbtn.on{color:#ff9f0a;border-top-color:#ff9f0a;}
.dz{border:2px dashed var(--ib);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--ibg);transition:all .2s;}
.dz.over{border-color:var(--ac);background:var(--acs);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--h1);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
textarea.inp{resize:none;min-height:80px;}
</style>

// ── [수정] streak 계산을 렌더 외부에서 캐싱
function calcStreak(ds){
  var streak=0, dd=new Date();
  while(true){
    var dateStr=dd.toISOString().slice(0,10);
    if(ds.find(function(x){return x.date===dateStr;})){streak++;dd.setDate(dd.getDate()-1);}
    else break;
  }
  return streak;
}

onSnapshot(BC, s=>{beans=s.docs.map(d=>({id:d.id,...d.data()}));render();});
onSnapshot(DC, s=>{
  diaries=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date.localeCompare(a.date));
  cachedStreak=calcStreak(diaries); // [수정] 데이터 변경 시에만 재계산
  render();
});

function showToast(m){S.toast=m;if(S.toastT)clearTimeout(S.toastT);S.toastT=setTimeout(()=>{S.toast="";render();},2400);render();}

function fchips(flavors,sz){
  sz=sz||"big";
  const p=sz==="big"?"10px 14px":"7px 10px",es=sz==="big"?"26px":"20px",ts=sz==="big"?"11px":"10px",mw=sz==="big"?"58px":"44px";
  return (flavors||[]).map(function(f){return '<div class="fchip" style="display:flex;flex-direction:column;align-items:center;background:#f5f5f7;border:1px solid rgba(0,0,0,0.06);border-radius:14px;padding:'+p+';min-width:'+mw+'"><span style="font-size:'+es+';margin-bottom:3px;">'+fe(f)+'</span><span style="font-size:'+ts+';color:#3a3a3c;font-weight:500;text-align:center;">'+f+'</span></div>';}).join("");
}
function stHtml(v,id,sz,ed){
  return [1,2,3,4,5].map(function(s){return '<span class="star'+(s<=v?" on":"")+'" style="font-size:'+(sz||16)+'px;" '+(ed?'onclick="setStar(\''+id+'\','+s+')"':'')+'>★</span>';}).join("");
}

async function parseImg(file){
  S.addStep="parsing";S.addPreview=URL.createObjectURL(file);render();
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
    var resp=await fetch(WK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},{type:"text",text:'커피 원두 정보를 추출해서 JSON만 반환. 다른 텍스트 없이 JSON만.\n원산지 한국어(Peru→페루,Ethiopia→에티오피아), 가공법 한국어(Washed→워시드,Natural→내추럴), 플레이버 한국어, 배전도 한국어(Light→라이트,Medium→미디엄).\n{"name":"","origin":"","region":"","producer":"","variety":"","altitude":"","process":"","roastLevel":"","flavor":[],"tagline":"","recipe":{"dripper":"","beans":"","waterTemp":"","grind":"","hot":"","iced":""}}'}]}]})});
    var data=await resp.json();
    if(!resp.ok)throw new Error("API "+resp.status);
    var txt=data.content.map(function(c){return c.text||"";}).join("");
    var parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
    S.addEdit=Object.assign({},parsed,{
      flavor:Array.isArray(parsed.flavor)?parsed.flavor.join(", "):(parsed.flavor||""),
      roaster:parsed.roaster||"",myNote:"",rating:4,status:"available",roastDate:"",startDate:"",
      rDripper:(parsed.recipe&&parsed.recipe.dripper)||"",rBeans:(parsed.recipe&&parsed.recipe.beans)||"",
      rTemp:(parsed.recipe&&parsed.recipe.waterTemp)||"",rGrind:(parsed.recipe&&parsed.recipe.grind)||"",
      rHot:(parsed.recipe&&parsed.recipe.hot)||"",rIced:(parsed.recipe&&parsed.recipe.iced)||""
    });
    S.addStep="review";render();

function mkInp(val,fn){return '<input style="'+IS+'" value="'+esc(val)+'" oninput="'+fn+'">';}

    +'<span style="font-size:24px;">'+(streak>=7?"🏆":streak>=3?"🔥":"☕")+'</span>'

      +'<button onclick="openDiaryEdit(\''+te.id+'\')" style="background:none;border:none;font-size:11px;color:#ff9f0a;font-weight:600;cursor:pointer;font-family:inherit;">수정</button>'

      +'<div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div style="display:flex;gap:2px;">'+stHtml(d.rating||0,"",13)+'</div>'
      +'<div style="display:flex;gap:12px;">'
      +'<button onclick="openDiaryEdit(\''+d.id+'\')" style="background:none;border:none;font-size:11px;color:#ff9f0a;font-weight:600;cursor:pointer;font-family:inherit;">수정</button>'

      +'</div></div></div></div>';
  });
  if(!diaries.length) html+='<div style="text-align:center;padding:40px 0;color:#8e8e93;"><div style="font-size:36px;margin-bottom:12px;">📝</div>아직 기록이 없어요</div>';
  return html+'</div>';
}

    +'<button onclick="saveDiary()" style="width:100%;background:#2c2c2e;color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:20px;">'+(isEdit?"수정 완료 ✅":"기록하기 ☕")+'</button>'
    +'</div></div>';
  return html;
}

function rPw(){
  return '<div class="mbg" style="align-items:center;justify-content:center;" onclick="if(event.target===this)closePw()">'
    +'<div style="background:#fff;border-radius:22px;width:calc(100% - 48px);max-width:320px;padding:28px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">'
    +'<div style="font-size:32px;margin-bottom:12px;">🔐</div>'
    +'<div style="font-size:17px;font-weight:700;color:#1c1c1e;margin-bottom:6px;">관리자 확인</div>'
    +'<div style="font-size:13px;color:#8e8e93;margin-bottom:20px;">비밀번호를 입력해주세요</div>'
    +'<input id="pw-inp" type="password" placeholder="비밀번호" style="width:100%;border:'+(S.pwErr?"2px solid #ff3b30":"1px solid #d1d1d6")+';border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;background:#f5f5f7;color:#1c1c1e;outline:none;text-align:center;letter-spacing:4px;box-sizing:border-box;" onkeydown="if(event.key===\'Enter\')submitPw()">'
    +(S.pwErr?'<div style="font-size:12px;color:#ff3b30;margin-top:8px;">비밀번호가 맞지 않아요</div>':"")
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closePw()" style="flex:1;background:#f5f5f7;color:#636366;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;cursor:pointer;">취소</button>'
    +'<button onclick="submitPw()" style="flex:1;background:#2c2c2e;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">확인</button>'
    +'</div></div></div>';
}

function rNav(){
  return '<div class="bnav">'+[["menu","메뉴판","☕"],["archive","아카이브","📚"],["diary","일기","📝"]].map(function(x){return '<button class="nbtn'+(S.tab===x[0]?" on":"")+'" onclick="setTab(\''+x[0]+'\')"><div style="font-size:20px;margin-bottom:2px;">'+x[2]+'</div>'+x[1]+'</button>';}).join("")+'</div>';
}

function render(){
  var body="";
  if(S.detail) body=rDetail(S.detail);
  else if(S.tab==="menu") body=rMenu();
  else if(S.tab==="diary") body=rDiary();
  else body=rArchive();
  document.getElementById("app").innerHTML=
    body+rNav()
    +(S.showAdd?rAdd():"")
    +(S.guestId?rGuest():"")
    +(S.showDiary?rDiaryModal():"")
    +(S.showPw?rPw():"")
    +(S.toast?'<div class="toast">'+S.toast+'</div>':"");
}
render();

// [수정] paste 이벤트 단일 등록 (window.handlePaste 제거 후 여기서만 처리)
document.addEventListener('paste', function(e){
  if(!S.showAdd || S.addStep !== 'upload') return;
  var items = (e.clipboardData||e.originalEvent&&e.originalEvent.clipboardData||{items:[]}).items||[];
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      var file=items[i].getAsFile();
      if(file){ parseImg(file); return; }
    }
  }
});
</script>
</body>
</html>
