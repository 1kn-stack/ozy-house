*{box-sizing:border-box;margin:0;padding:0;}
:root{

}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--t1);}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);}
@media(min-width:768px){
  body{background:#2a1a0c;}
  #app{margin:32px auto;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.4);min-height:auto;}
  .bnav{border-radius:0 0 24px 24px;}
}
.bebas{font-family:'Cardo',serif;font-weight:700;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.cani{animation:fadeUp .28s ease both;}
.fchip{transition:transform .15s;cursor:default;}.fchip:hover{transform:scale(1.06);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(8px);}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:28px 22px 40px;max-height:90vh;overflow-y:auto;}
.inp{width:100%;border:1px solid var(--ib);border-radius:12px;padding:11px 14px;font-size:14px;font-family:inherit;background:var(--ibg);color:var(--t1);outline:none;transition:border-color .15s;-webkit-appearance:none;box-sizing:border-box;}
.inp:focus{border-color:var(--ac);}
.lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:6px;margin-top:14px;}
.btnp{width:100%;background:var(--h1);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:18px;}
.btns{background:var(--card);color:var(--t2);border:1px solid var(--ib);border-radius:12px;padding:11px 18px;font-size:13px;font-family:inherit;cursor:pointer;}
.star{font-size:18px;cursor:pointer;color:rgba(42,26,12,0.15);transition:color .1s;display:inline-block;line-height:1;}.star.on{color:#b84830;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(244,236,224,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid rgba(42,26,12,0.12);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);max-width:480px;margin:0 auto;}
@media(min-width:768px){.bnav{left:50%;transform:translateX(-50%);right:auto;width:480px;border-radius:0 0 24px 24px;}}
.nbtn{flex:1;background:none;border:none;color:#a07858;padding:10px 0 13px;font-family:'Hahmlet',serif;font-size:8px;cursor:pointer;border-top:2px solid transparent;letter-spacing:1.5px;text-transform:uppercase;font-weight:300;}
.nbtn.on{color:#28160a;border-top-color:#b84830;font-weight:400;}
.dz{border:2px dashed var(--ib);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--ibg);transition:all .2s;}
.dz.over{border-color:var(--ac);background:var(--acs);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--h1);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
textarea.inp{resize:none;min-height:80px;}
</style>

function normalizeRecipe(r){
  if(!r) return {dripper:"",hot:{beans:"",grind:"",waterTemp:"",pour:""},iced:{beans:"",grind:"",waterTemp:"",pour:""}};
  // 이미 신규 구조 (hot이 object)
  if(r.hot && typeof r.hot==="object"){
    var hotTemp=r.hot.waterTemp||"";
    var icedTemp=r.iced&&r.iced.waterTemp||"";
    // 한쪽에만 waterTemp 있으면 반대쪽에도 복사
    if(hotTemp && !icedTemp) icedTemp=hotTemp;
    if(icedTemp && !hotTemp) hotTemp=icedTemp;
    return {
      dripper:normDripper(r.dripper||""),
      hot:{beans:r.hot.beans||"",grind:r.hot.grind||"",waterTemp:hotTemp,pour:r.hot.pour||""},
      iced:{beans:r.iced&&r.iced.beans||"",grind:r.iced&&r.iced.grind||"",waterTemp:icedTemp,pour:r.iced&&r.iced.pour||""}
    };
  }
  // 구버전 → 신규로 변환 (waterTemp 공통 필드라 둘 다 동일하게)
  return {
    dripper:normDripper(r.dripper||""),
    hot:{beans:r.beans||"",grind:r.grind||"",waterTemp:r.waterTemp||"",pour:r.hot||""},

  };
}

function getDegasDays(roastLevel){

// 오늘 기준 디개싱 상태 계산
// 반환: {status:"degassing"|"ready"|"none", daysSince:N, degasEndDate:"YYYY-MM-DD", remaining:N}
function getDegasInfo(b){
  var roastDate = b.degasDate || b.roastDate; // degasDate 수동 설정 우선
  if(!roastDate) return {status:"none"};
  var roast = new Date(roastDate);
  var today = new Date(new Date().toISOString().slice(0,10));
  var daysSince = Math.floor((today - roast) / 86400000);
  var totalDays = b.degasDays != null ? b.degasDays : getDegasDays(b.roastLevel);
  var degasEndDate = new Date(roast.getTime() + totalDays * 86400000).toISOString().slice(0,10);
  if(daysSince < 0) return {status:"none"}; // 로스팅 전
  if(daysSince < totalDays){
    return {status:"degassing", daysSince:daysSince, degasEndDate:degasEndDate, remaining:totalDays-daysSince, totalDays:totalDays};
  }
  return {status:"ready", daysSince:daysSince, degasEndDate:degasEndDate, totalDays:totalDays};
}

function getFlavorColor(name){
  if(!name) return "#b89070";
  var lo=name.toLowerCase();
  for(var i=0;i<FLAVOR_COLOR.length;i++){
    var fc=FLAVOR_COLOR[i];
    for(var j=0;j<fc.keys.length;j++){
      if(lo.indexOf(fc.keys[j])!==-1) return fc.c;
    }
  }
  return "#b89070";
}

function getFlavorGradient(flavors){
  if(!flavors||!flavors.length) return null;
  var colors=flavors.map(function(f){return getFlavorColor(f);});
  if(colors.length===1) return colors[0]+' 0%, '+colors[0]+' 100%';
  return colors.map(function(c,i){return c+' '+(i/(colors.length-1)*100).toFixed(0)+'%';}).join(', ');
}

function getFlavorBg(flavors){
  if(!flavors||!flavors.length) return null;
  var grad=getFlavorGradient(flavors);
  if(!grad) return null;
  return {grad:grad, c1:getFlavorColor(flavors[0]), c2:getFlavorColor(flavors[flavors.length-1])};
}

// ── [수정] streak 계산을 렌더 외부에서 캐싱
function calcStreak(ds){
  var streak=0, dd=new Date();
  while(true){
    var dateStr=dd.toISOString().slice(0,10);
    if(ds.find(function(x){return x.date===dateStr;})){streak++;dd.setDate(dd.getDate()-1);}
    else break;
  }
  return streak;
}

function fchips(flavors,sz){
  if(!flavors||!flavors.length) return "";
  var isSmall=sz==="small";
  var boxSz=isSmall?17:24;
  var imgSz=isSmall?14:20;
  var emoFont=isSmall?"13px":"20px";
  var txtSz=isSmall?"9px":"10px";
  var pad=isSmall?"5px 4px":"8px 5px";
  var chipH=isSmall?'auto':'60px';
  var bigIcons={'hongsi':0.85,'nuts':1,'caramel':1};
  var grad=getFlavorGradient(flavors);
  var barHtml=grad?'<div style="height:'+(isSmall?'3px':'4px')+';border-radius:2px;margin-bottom:'+(isSmall?'8px':'10px')+';background:linear-gradient(90deg,'+grad+');">'+'</div>':"";
  var chips=flavors.map(function(f){
    var ico=fe(f);
    var icoHtml;
    if(ico.indexOf('__svg_')===0){
      var svgKey=ico.slice(6);
      var sz2=bigIcons[svgKey]?Math.round(imgSz*1.3):imgSz;
      var svgStr=getSvgIcon(svgKey,String(sz2));
      var wrap='<div style="width:'+boxSz+'px;height:'+boxSz+'px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:visible;">';
      icoHtml=wrap+(svgStr||'<span style="font-size:'+emoFont+';">✨</span>')+'</div>';
    } else {
      var wrap='<div style="width:'+boxSz+'px;height:'+boxSz+'px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">';
      icoHtml=wrap+'<span style="font-size:'+emoFont+';line-height:1;">'+ico+'</span></div>';
    }
    return '<div class="fchip" style="height:'+chipH+';display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:2px;background:#fffaf2;border:0.5px solid rgba(42,26,12,0.09);border-radius:10px;padding:'+pad+';">'  
      +icoHtml
      +'<span style="font-size:'+txtSz+';color:#7a4e2a;font-weight:300;text-align:center;width:100%;word-break:keep-all;overflow-wrap:break-word;line-height:1.3;margin-top:auto;">'+f+'</span>'
      +'</div>';
  }).join("");
  return barHtml+'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;">'+chips+'</div>';
}

function getSvgIcon(k,sz){var t=SVG_ICONS[k];return t?t.replace(/__SZ__/g,sz):null;}
function stHtml(v,id,sz,ed){
  return [1,2,3,4,5].map(function(s){return '<span class="star'+(s<=v?" on":"")+'" style="font-size:'+(sz||16)+'px;" '+(ed?'onclick="setStar(\''+id+'\','+s+')"':'')+'>★</span>';}).join("");
}

// ── 핸들러
window.setStar = function(id,v){
  if(id==="add"&&S.addEdit){S.addEdit.rating=v;render();}
  if(id==="edit"&&S.editData){S.editData.rating=v;render();}
  if(id==="diary"){S.diaryForm.rating=v;render();}
};
window.toggleRec = function(id){
  var el=document.getElementById('rec-'+id);
  var btn=document.getElementById('rec-btn-'+id);
  if(!el) return;
  var isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  if(btn) btn.textContent='추출 레시피 '+(isOpen?'▼':'▲');
};
window.setTab = function(t){S.tab=t;S.detail=null;S.editMode=false;pushHistory();render();};
window.setFilter = function(f){S.filter=f;render();};
window.openDetail = function(id){S.detail=id;S.editMode=false;pushHistory();render();};
window.closeDetail = function(){S.detail=null;S.editMode=false;render();};

window.requirePw = function(action){S.showPw=true;S.pwAction=action;S.pwErr=false;render();setTimeout(function(){var el=document.getElementById("pw-inp");if(el)el.focus();},100);};
window.closePw = function(){S.showPw=false;S.pwAction=null;S.pwErr=false;render();};
window.submitPw = async function(){
  var val=(document.getElementById("pw-inp")||{}).value||"";
  var h=await hp(val);
  if(h===AH){S.showPw=false;S.pwErr=false;var a=S.pwAction;S.pwAction=null;render();if(a)a();}
  else{S.pwErr=true;render();setTimeout(function(){var el=document.getElementById("pw-inp");if(el){el.value="";el.focus();}},50);}
};

window.openEdit = function(id){
  requirePw(function(){
    S.detail=id;S.editMode=true;
    var b=beans.find(function(x){return x.id===id;});
    if(b){
      var nr=normalizeRecipe(b.recipe);
      S.editData=Object.assign({},b,{
        roastLevel:normRL(b.roastLevel)||b.roastLevel||"미디엄",
        flavor:Array.isArray(b.flavor)?b.flavor.join(", "):(b.flavor||""),
        rDripper:nr.dripper,
        rHotBeans:nr.hot.beans,rHotGrind:nr.hot.grind,rHotTemp:nr.hot.waterTemp,rHotPour:nr.hot.pour,
        rIcedBeans:nr.iced.beans,rIcedGrind:nr.iced.grind,rIcedTemp:nr.iced.waterTemp,rIcedPour:nr.iced.pour
      });
    }
    render();
  });
};
window.closeEdit = function(){S.editMode=false;S.editScanState="idle";render();};
window.editScanPaste = function(e){
  e.stopPropagation();
  var items=(e.clipboardData||{items:[]}).items||[];
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf("image")!==-1){
      var file=items[i].getAsFile();
      if(file){ editScanImg({files:[file]}); return; }
    }
  }
};
window.editScanImg = async function(input){
  var file=input.files[0]; if(!file) return;
  S.editScanState="scanning"; render();
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});

async function parseImg(file){
  S.addStep="parsing";S.addPreview=URL.createObjectURL(file);render();
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
    var resp=await fetch(WK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},{type:"text",text:PARSE_PROMPT}]}]})})
    var data=await resp.json();
    if(!resp.ok)throw new Error("API "+resp.status);
    var txt=data.content.map(function(c){return c.text||"";}).join("");
    var parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
    var nr=normalizeRecipe(parsed.recipe);
    S.addEdit=Object.assign({},parsed,{
      flavor:Array.isArray(parsed.flavor)?parsed.flavor.join(", "):(parsed.flavor||""),
      roaster:parsed.roaster||"",myNote:"",rating:4,status:"available",roastDate:"",startDate:"",
      process:normProcess(parsed.process)||parsed.process||"",
      roastLevel:normRL(parsed.roastLevel)||parsed.roastLevel||"",
      rDripper:nr.dripper,
      rHotBeans:nr.hot.beans,rHotGrind:nr.hot.grind,rHotTemp:nr.hot.waterTemp,rHotPour:nr.hot.pour,
      rIcedBeans:nr.iced.beans,rIcedGrind:nr.iced.grind,rIcedTemp:nr.iced.waterTemp,rIcedPour:nr.iced.pour
    });
    S.addStep="review";render();
  }catch(err){console.error(err);S.addStep="error";render();}
}

  var fl=e&&e.flavor?e.flavor.split(",").map(function(f){return f.trim();}).filter(Boolean):[];
  var html='<div class="mbg" onclick="if(event.target===this)closeAdd()"><div class="mbox">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
    +'<div style="font-size:18px;font-weight:700;">'+(S.addManual?'원두 직접 입력 ✍️':'원두 스캔 추가 ✨')+'</div>'
    +'<button onclick="closeAdd()" style="background:#f4ece0;border:none;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;color:#7a4e2a;display:flex;align-items:center;justify-content:center;">×</button>'
    +'</div><div style="font-size:13px;color:#b89070;margin-bottom:20px;">어떤 로스터리 이미지든 자동으로 인식해요</div>';

  if(s==="upload"){
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    var hint = isMobile
      ? '탭해서 갤러리 선택'
      : '드래그 · 탭해서 선택 · <b style="color:#b84830;">Ctrl+V 붙여넣기</b>';
    // contenteditable: 모바일 길게누르기 붙여넣기 + PC Ctrl+V 모두 지원
    // 파일 선택은 별도 버튼으로 분리 (드롭존 클릭 시 키보드 올라오는 문제 방지)
    html+='<div class="dz'+(S.addDrag?' over':'')+'" ondragover="handleDragOver(event)" ondragleave="handleDragLeave()" ondrop="handleFileDrop(event)" style="position:relative;padding:0;">'
      +'<div id="dz-main" contenteditable="true" onpaste="handleDzPaste(event)" oninput="this.innerHTML=\'\'" style="position:absolute;inset:0;opacity:0;cursor:default;"></div>'
      +'<div style="padding:36px 20px;text-align:center;pointer-events:none;">'
      +'<div style="font-size:40px;margin-bottom:10px;">📸</div>'
      +'<div style="font-weight:600;color:#28160a;margin-bottom:6px;font-size:15px;">이미지를 붙여넣으세요</div>'
      +'<div style="font-size:12px;color:#b89070;line-height:1.8;">'+(isMobile?'이 영역을 <b style="color:#b84830;">길게 눌러</b> 붙여넣기':'<b style="color:#b84830;">Ctrl+V</b> 또는 드래그')+'</div>'
      +'</div>'
      +'</div>'
      +'<input id="fi" type="file" accept="image/*" style="display:none;" onchange="handleFileInput(event)"/>'
      +'<button onclick="document.getElementById(\'fi\').click()" style="width:100%;background:#f4ece0;color:#3d2510;border:1.5px solid rgba(42,26,12,0.15);border-radius:14px;padding:13px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;margin-top:12px;">🗂 갤러리에서 선택</button>'
      +(isMobile
        ? '<input id="fi-cam" type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleFileInput(event)"/>'
          +'<button onclick="document.getElementById(\'fi-cam\').click()" style="width:100%;background:#b84830;color:#fff;border:none;border-radius:14px;padding:13px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:8px;">📷 카메라로 찍기</button>'
        : ''
      )
      +'<div style="background:#f4ece0;border-radius:14px;padding:16px;font-size:12px;color:#7a4e2a;margin-top:14px;line-height:1.8;">'
      +'<div style="font-weight:600;margin-bottom:8px;color:#28160a;">📋 인식 가능한 포맷</div>'
      +'<div class="g2">'+[["🇰🇷 한국 로스터리","플레이버 카드"],["🌍 해외 로스터리","영문 테이블"],["🛒 스마트스토어","상품 상세 캡처"],["📄 기타","원두 정보 이미지"]].map(function(x){return '<div style="background:#fff;border-radius:10px;padding:10px;border:0.5px solid rgba(0,0,0,0.08);"><div style="font-weight:600;margin-bottom:2px;font-size:12px;">'+x[0]+'</div><div style="font-size:11px;color:#b89070;">'+x[1]+'</div></div>';}).join("")+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:12px;margin:16px 0;">'
      +'<div style="flex:1;height:1px;background:rgba(42,26,12,0.1);"></div>'
      +'<span style="font-size:12px;color:#b89070;">또는</span>'
      +'<div style="flex:1;height:1px;background:rgba(42,26,12,0.1);"></div>'
      +'</div>'
      +'<button onclick="openManual()" style="width:100%;background:#f4ece0;color:#3d2510;border:1.5px solid rgba(42,26,12,0.15);border-radius:14px;padding:13px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;">✍️ 직접 입력하기</button>';
  }
  if(s==="parsing"){
    html+='<div style="text-align:center;padding:40px 16px;">'
      +(S.addPreview?'<img src="'+S.addPreview+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:14px;margin-bottom:20px;opacity:.7;">':"")
      +'<div style="font-size:44px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:16px;">☕</div>'
      +'<div style="font-weight:600;color:#28160a;font-size:15px;">이미지 분석 중...</div></div>';
  }
  if(s==="error"){
    html+='<div style="text-align:center;padding:30px 16px;">'
      +'<div style="font-size:40px;margin-bottom:14px;">😔</div>'
      +'<div style="font-weight:600;color:#ff3b30;margin-bottom:8px;">분석에 실패했어요</div>'
      +'<button onclick="resetScan()" class="btns">다시 시도</button></div>';
  }

  // [수정] review 스텝 — html += 체이닝 버그 수정. 모든 내용을 단일 html += 로 연결
  if(s==="review"&&e){
    var reviewBanner = S.addManual
      ? '<div style="background:#fbeee8;border:1px solid #ffd6a0;border-radius:12px;padding:12px 14px;margin-bottom:16px;"><div style="font-size:12px;color:#c05e00;font-weight:600;">✍️ 직접 입력 모드 — 원두 정보를 입력해주세요</div></div>'
      : '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 14px;margin-bottom:16px;"><div style="font-size:12px;color:#166534;font-weight:600;margin-bottom:4px;">✅ 분석 완료 — 확인 후 수정해주세요</div><div style="font-size:12px;color:#4a8060;">'+gFL(e.origin)+' '+(e.origin||"")+' · '+(e.process||"")+' · '+(e.roastLevel||"")+'</div></div>';

    var flavorPreview = fl.length
      ? '<div style="margin-bottom:14px;"><div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#b89070;margin-bottom:8px;">감지된 플레이버</div><div style="display:flex;gap:7px;flex-wrap:wrap;">'+fchips(fl,"small")+'</div></div>'
      : "";

    var backBtn = S.addManual
      ? '<button onclick="closeManual()" style="width:100%;margin-bottom:10px;background:#f4ece0;color:#7a4e2a;border:1px solid rgba(42,26,12,0.15);border-radius:14px;padding:13px;font-size:14px;font-family:inherit;cursor:pointer;">← 이미지로 돌아가기</button>'
      : "";

    html += reviewBanner
      + flavorPreview
      + mkLbl("원두 이름") + mkInp(e.name,"addInput('name',this.value)")
      + mkLbl("로스터리") + mkInp(e.roaster||"","addInput('roaster',this.value)")
      + '<div class="g2">'
      + '<div>'+mkLbl("원산지")+mkInp(e.origin,"addInput('origin',this.value)")+'</div>'
      + '<div>'+mkLbl("지역")+mkInp(e.region,"addInput('region',this.value)")+'</div>'
      + '<div>'+mkLbl("가공방식")+mkProcess(e.process,"addInput('process',this.value)")+'</div>'
      + '<div>'+mkLbl("배전도")+mkRL(e.roastLevel,"addInput('roastLevel',this.value)")+'</div>'
      + '<div>'+mkLbl("로스팅 일자")+mkDate(e.roastDate,"addInput('roastDate',this.value)")+'</div>'
      + '<div>'+mkLbl("소비 시작일")+mkDate(e.startDate,"addInput('startDate',this.value)")+'</div>'
      + '<div>'+mkLbl("디개싱 시작일 (기본:로스팅일)")+mkDate(e.degasDate||"","addInput('degasDate',this.value)")+'</div>'
      + '<div>'+mkLbl("디개싱 기간(일)")+mkInp(e.degasDays!=null?e.degasDays:getDegasDays(e.roastLevel||"")+"","addInput('degasDays',this.value)")+'</div>'
      + '</div>'
      + mkLbl("품종")+mkInp(e.variety,"addInput('variety',this.value)")
      + mkLbl("농장/생산자")+mkInp(e.producer||"","addInput('producer',this.value)")
      + mkLbl("고도")+mkInp(e.altitude,"addInput('altitude',this.value)")
      + mkLbl("플레이버 (쉼표 구분)")+mkInp(e.flavor,"addInput('flavor',this.value)")
      + mkLbl("한줄 설명")+mkInp(e.tagline,"addInput('tagline',this.value)")
      + '<div class="g2">'
      + '<div>'+mkLbl("드리퍼")+mkDripper(e.rDripper,"addInput('rDripper',this.value)")+'</div>'
      + '</div>'
      + '<div style="background:#f9f9f9;border-radius:14px;padding:14px;margin-top:14px;border:1px solid rgba(42,26,12,0.1);">'
      + '<div style="font-size:11px;font-weight:700;color:#b84830;letter-spacing:1px;margin-bottom:10px;">☀️ HOT</div>'
      + '<div class="g2">'
      + '<div>'+mkLbl("원두량")+mkInp(e.rHotBeans,"addInput('rHotBeans',this.value)")+'</div>'
      + '<div>'+mkLbl("물온도")+mkInp(e.rHotTemp,"addInput('rHotTemp',this.value)")+'</div>'
      + '<div>'+mkLbl("분쇄도")+mkInp(e.rHotGrind,"addInput('rHotGrind',this.value)")+'</div>'
      + '</div>'
      + mkLbl("푸어 레시피")+mkInp(e.rHotPour,"addInput('rHotPour',this.value)")
      + '</div>'
      + '<div style="background:#eff6ff;border-radius:14px;padding:14px;margin-top:10px;border:1px solid #dbeafe;">'
      + '<div style="font-size:11px;font-weight:700;color:#1d4ed8;letter-spacing:1px;margin-bottom:10px;">🧊 ICED</div>'
      + '<div class="g2">'
      + '<div>'+mkLbl("원두량")+mkInp(e.rIcedBeans,"addInput('rIcedBeans',this.value)")+'</div>'
      + '<div>'+mkLbl("물온도")+mkInp(e.rIcedTemp,"addInput('rIcedTemp',this.value)")+'</div>'
      + '<div>'+mkLbl("분쇄도")+mkInp(e.rIcedGrind,"addInput('rIcedGrind',this.value)")+'</div>'
      + '</div>'
      + mkLbl("푸어 레시피")+mkInp(e.rIcedPour,"addInput('rIcedPour',this.value)")
      + '</div>'
      + mkLbl("나의 소감")+mkTA(e.myNote,"addInput('myNote',this.value)")
      + '<label style="'+IL+';margin-top:14px;">평점</label>'
      + '<div style="margin-top:4px;">'+stHtml(e.rating||4,"add",24,true)+'</div>'
      + backBtn
      + '<div style="display:flex;gap:10px;margin-top:20px;">'
      + '<button onclick="resetScan()" class="btns" style="flex:1;">다시 스캔</button>'
      + '<button onclick="saveBean()" style="flex:2;background:#2a1a0c;color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">저장하기 🫘</button>'
      + '</div>';
  }

  return html+'</div></div>';
}

function rGuest(){
  var b=beans.find(function(x){return x.id===S.guestId;});if(!b)return "";
  return '<div class="mbg" onclick="if(event.target===this)closeGuest()"><div class="mbox" style="max-height:72vh;">'
    +'<div style="font-size:18px;font-weight:700;margin-bottom:4px;">소감 남기기 ✏️</div>'
    +'<div style="font-size:13px;color:#b89070;margin-bottom:20px;">'+esc(b.name)+'</div>'
    +mkLbl("이름")+'<input id="guest-name" class="inp" placeholder="이름을 입력해주세요" value="'+esc(S.guestForm.name)+'" style="margin-bottom:4px;">'
    +mkLbl("한 마디")+'<textarea id="guest-note" class="inp" placeholder="이 커피 어떠셨나요? 🍑" style="resize:none;min-height:80px;">'+esc(S.guestForm.note)+'</textarea>'
    +'<button class="btnp" onclick="submitGuest()">기록하기</button>'
    +'</div></div>';
}

function rDiary(){
  var today=new Date().toISOString().slice(0,10);
  var te=diaries.find(function(d){return d.date===today;});
  var MC={"☀️":"#fff9c4","🌧":"#e3f2fd","😴":"#f3e5f5","🎉":"#fff3e0","❄️":"#e0f7fa","🌙":"#ede7f6"};
  // [수정] streak 재계산 제거 → 캐싱된 cachedStreak 사용
  var streak = cachedStreak;
  var sm=streak===0?"오늘 첫 기록을 남겨보세요 ☕":streak<3?streak+"일 연속 기록 중 ☕":streak<7?streak+"일 연속! 커피 루틴이 생겼어요 🔥":streak+"일 연속!! 진짜 커피 집사예요 🏆";

  var html='<div style="'+HG+';padding:52px 22px 28px;">'
    +'<div class="bebas" style="font-size:36px;color:#fff;">COFFEE DIARY</div>'
    +'<div style="color:rgba(255,255,255,0.35);font-size:12px;margin-top:2px;">나의 커피 기록</div>'
    +'<div style="margin-top:16px;background:rgba(255,159,10,0.15);border:1px solid rgba(255,159,10,0.3);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;">'
    +'<span style="font-size:24px;">'+(streak>=7?"🏆":streak>=3?"🔥":"☕")+'</span>'
    +'<div><div style="color:#b84830;font-size:13px;font-weight:600;">'+sm+'</div>'
    +'<div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:2px;">총 '+diaries.length+'개의 기록</div></div>'
    +'</div></div><div style="padding:14px 14px 96px;">';

  if(!te){
    html+='<div style="background:#fff;border-radius:20px;margin-bottom:14px;padding:22px;box-shadow:0 2px 16px rgba(0,0,0,0.07);text-align:center;">'
      +'<div style="font-size:32px;margin-bottom:8px;">✍️</div>'
      +'<div style="font-weight:700;font-size:15px;color:#28160a;margin-bottom:4px;">오늘의 커피 기록</div>'
      +'<div style="font-size:13px;color:#b89070;margin-bottom:16px;">오늘 마신 커피를 기록해보세요</div>'
      +'<button onclick="openDiary()" style="background:#2a1a0c;color:#fff;border:none;border-radius:14px;padding:13px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">+ 오늘 기록하기</button>'
      +'</div>';
  } else {
    var mc=MC[te.mood]||"#f4ece0";
    var teCups=te.cups&&te.cups.length?te.cups:(te.beanId?[{beanId:te.beanId,beanName:te.beanName,brewType:te.brewType||"hot"}]:[]);
    var btag=teCups.map(function(c,ci){
      return '<div style="display:inline-flex;align-items:center;gap:4px;background:'+(c.brewType==="iced"?"#eff6ff":"#fff5eb")+';color:'+(c.brewType==="iced"?"#1d4ed8":"#c05e00")+';border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:6px;margin-right:4px;">'+(c.brewType==="iced"?"🧊":"☀️")+(ci>0?" "+(ci+1)+"잔":"")+(c.beanName?" · "+esc(c.beanName):"")+'</div>';
    }).join("");
    html+='<div style="background:#fff;border-radius:20px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.07);">'
      +'<div style="background:'+mc+';padding:16px 18px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div><div style="font-size:11px;color:#b89070;">오늘 · '+te.date+'</div>'
      +function(){
        var cupCount=teCups.length;
        if(cupCount<=1) return '<div style="font-size:15px;font-weight:700;color:#28160a;">'+te.mood+' 오늘의 한 잔</div>';
        var KOR=["","한","두","세","네","다섯","여섯","일곱","여덟"];
        var countStr=cupCount<KOR.length?KOR[cupCount]+" 잔":cupCount+"잔";
        var yesterday=new Date(new Date(today).getTime()-86400000).toISOString().slice(0,10);
        var yEntry=diaries.find(function(x){return x.date===yesterday;});
        var yCups=yEntry?(yEntry.cups&&yEntry.cups.length?yEntry.cups.length:(yEntry.beanId?1:0)):0;
        var particle=yCups===cupCount?"도":"은";
        return '<div style="font-size:15px;font-weight:700;color:#28160a;">'+te.mood+' 오늘'+particle+' '+countStr+'</div>';
      }()
      +(te.beanName?'<div style="font-size:12px;color:#b84830;margin-top:2px;">☕ '+esc(te.beanName)+'</div>':"")
      +'</div><span style="font-size:28px;">'+te.mood+'</span></div>'
      +'<div style="padding:14px 18px 16px;">'
      +btag
      +'<div style="font-size:14px;color:#3d2510;line-height:1.8;white-space:pre-wrap;">'+esc(te.note)+'</div>'
      +'<div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div style="display:flex;gap:2px;">'+stHtml(te.rating||0,"",14)+'</div>'
      +'<div style="display:flex;gap:12px;">'
      +'<button onclick="openDiaryEdit(\''+te.id+'\')" style="background:none;border:none;font-size:11px;color:#b84830;font-weight:600;cursor:pointer;font-family:inherit;">수정</button>'
      +'<button onclick="deleteDiary(\''+te.id+'\')" style="background:none;border:none;font-size:11px;color:rgba(42,26,12,0.18);cursor:pointer;font-family:inherit;">삭제</button>'
      +'</div></div></div></div>';
  }

  var prev=diaries.filter(function(d){return d.date!==today;});
  if(prev.length) html+='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#b89070;margin:20px 2px 10px;">이전 기록</div>';
  prev.forEach(function(d,i){
    var mc=MC[d.mood]||"#f4ece0";
    var dCups=d.cups&&d.cups.length?d.cups:(d.beanId?[{beanId:d.beanId,beanName:d.beanName,brewType:d.brewType||"hot"}]:[]);
    var btag=dCups.map(function(c,ci){
      return '<div style="display:inline-flex;align-items:center;gap:4px;background:'+(c.brewType==="iced"?"#eff6ff":"#fff5eb")+';color:'+(c.brewType==="iced"?"#1d4ed8":"#c05e00")+';border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600;margin-bottom:6px;margin-right:4px;">'+(c.brewType==="iced"?"🧊":"☀️")+(ci>0?" "+(ci+1)+"잔":"")+(c.beanName?" · "+esc(c.beanName):"")+'</div>';
    }).join("");
    html+='<div class="cani" style="background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 8px rgba(0,0,0,0.05);animation-delay:'+(i*.04)+'s;">'
      +'<div style="background:'+mc+';padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div><div style="font-size:11px;color:#b89070;">'+d.date+'</div>'
      +(d.beanName?'<div style="font-size:12px;color:#7a4e2a;font-weight:500;">☕ '+esc(d.beanName)+'</div>':"")
      +'</div><span style="font-size:24px;">'+d.mood+'</span></div>'
      +'<div style="padding:12px 16px 14px;">'
      +btag
      +'<div style="font-size:13px;color:#3d2510;line-height:1.7;white-space:pre-wrap;">'+esc(d.note)+'</div>'
      +'<div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div style="display:flex;gap:2px;">'+stHtml(d.rating||0,"",13)+'</div>'
      +'<div style="display:flex;gap:12px;">'
      +'<button onclick="openDiaryEdit(\''+d.id+'\')" style="background:none;border:none;font-size:11px;color:#b84830;font-weight:600;cursor:pointer;font-family:inherit;">수정</button>'
      +'<button onclick="deleteDiary(\''+d.id+'\')" style="background:none;border:none;font-size:11px;color:rgba(42,26,12,0.18);cursor:pointer;font-family:inherit;">삭제</button>'
      +'</div></div></div></div>';
  });

window.migrateAllBeans=async function(){
  if(!confirm('전체 원두 데이터를 정규화할까요?\n배전도(중약배전→미디엄라이트 등)와 레시피 구조를 일괄 변환합니다.')) return;
  S.migrateState="running"; S.migrateLog=""; render();
  var total=beans.length, done=0, skipped=0, errors=0;
  for(var i=0;i<beans.length;i++){
    var b=beans[i];
    try{
      var newRL=normRL(b.roastLevel);
      var newProcess=normProcess(b.process);
      var newRecipe=normalizeRecipe(b.recipe);
      var changed=false;
      var upd={};
      if(newRL && newRL!==b.roastLevel){upd.roastLevel=newRL; changed=true;}
      if(newProcess && newProcess!==b.process){upd.process=newProcess; changed=true;}
      var isOldRecipe=b.recipe&&(typeof b.recipe.hot==="string"||b.recipe.beans!==undefined);
      if(isOldRecipe){upd.recipe=newRecipe; changed=true;}
      if(changed){
        await fuB(b.id,upd);
        done++;
      } else {
        skipped++;
      }
    } catch(e){
      errors++;
    }
  }
  S.migrateState="done";
  S.migrateLog=total+'개 원두 처리 완료 — 변환: '+done+'개 / 이미 최신: '+skipped+'개'+(errors?(' / 오류: '+errors+'개'):'');
  render();
  showToast('정규화 완료 ✅ '+done+'개 변환');
};
window.exportAdminSettings=function(){
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="ozy-settings-"+new Date().toISOString().slice(0,10)+".json";
  a.click();showToast("설정 파일을 내보냈어요 📁");
};
window.resetAdminSettings=async function(){
  if(!confirm("모든 설정을 기본값으로 초기화할까요?"))return;
  await setDoc(SC,Object.assign({},DEFAULT_SETTINGS,{degasDays:Object.assign({},DEFAULT_SETTINGS.degasDays)}));
  showToast("기본값으로 초기화됐어요");
};


function rPw(){
  return '<div class="mbg" style="align-items:center;justify-content:center;" onclick="if(event.target===this)closePw()">'
    +'<div style="background:#fff;border-radius:22px;width:calc(100% - 48px);max-width:320px;padding:28px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">'
    +'<div style="font-size:32px;margin-bottom:12px;">🔐</div>'
    +'<div style="font-size:17px;font-weight:700;color:#28160a;margin-bottom:6px;">관리자 확인</div>'
    +'<div style="font-size:13px;color:#b89070;margin-bottom:20px;">비밀번호를 입력해주세요</div>'
    +'<input id="pw-inp" type="password" placeholder="비밀번호" style="width:100%;border:'+(S.pwErr?"2px solid #ff3b30":"1px solid rgba(42,26,12,0.15)")+';border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;background:#f4ece0;color:#28160a;outline:none;text-align:center;letter-spacing:4px;box-sizing:border-box;" onkeydown="if(event.key===\'Enter\')submitPw()">'
    +(S.pwErr?'<div style="font-size:12px;color:#ff3b30;margin-top:8px;">비밀번호가 맞지 않아요</div>':"")
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closePw()" style="flex:1;background:#f4ece0;color:#7a4e2a;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;cursor:pointer;">취소</button>'
    +'<button onclick="submitPw()" style="flex:1;background:#2a1a0c;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">확인</button>'
    +'</div></div></div>';
}

function rNav(){
  return '<div class="bnav">'+[["menu","Lineup",""],["archive","Archive",""],["diary","Diary",""]].map(function(x){
    return '<button class="nbtn'+(S.tab===x[0]?" on":"")+'" onclick="setTab(\''+x[0]+'\')" oncontextmenu="event.preventDefault();openAdmin()" ontouchstart="navLongStart(event)" ontouchend="navLongEnd()" ontouchcancel="navLongEnd()"><div style="font-size:20px;margin-bottom:2px;">'+x[2]+'</div>'+x[1]+'</button>';
  }).join("")+'</div>';
}

function render(){
  var body="";
  if(S.detail) body=rDetail(S.detail);
  else if(S.tab==="menu") body=rMenu();
  else if(S.tab==="diary") body=rDiary();
  else body=rArchive();
  document.getElementById("app").innerHTML=
    body+rNav()
    +(S.showAdd?rAdd():"")
    +(S.guestId?rGuest():"")
    +(S.showDiary?rDiaryModal():"")
    +(S.showPw?rPw():"")
    +(S.showDegasEdit?rDegasModal():"")
    +(S.showAdmin?rAdmin():"")
    +(S.toast?'<div class="toast">'+S.toast+'</div>':"");
}
render();

// ── History API — SPA 뒤로가기 처리
function getHistoryState(){
  return {tab:S.tab, detail:S.detail};
}
function pushHistory(){
  history.pushState(getHistoryState(), "");
}
// 초기 상태 replace (첫 진입 시 스택 기준점)
history.replaceState(getHistoryState(), "");

window.addEventListener('popstate', function(e){
  var state = e.state;
  if(!state) return;
  // 모달 열려있으면 모달만 닫기
  if(S.showAdd||S.showDiary||S.showPw||S.showDegasEdit||S.guestId||S.showAdmin){
    S.showAdd=false;S.showDiary=false;S.showPw=false;S.showDegasEdit=false;S.guestId=null;S.showAdmin=false;
    S.pwAction=null;S.pwErr=false;
    history.pushState(getHistoryState(),"");
    render();
    return;
  }
  // 상세 페이지 → 목록으로
  if(S.detail && !state.detail){
    S.detail=null;S.editMode=false;render();return;
  }
  // 탭 전환
  S.tab=state.tab||"menu";
  S.detail=state.detail||null;
  S.editMode=false;
  render();
});

// [수정] paste 이벤트 단일 등록 (window.handlePaste 제거 후 여기서만 처리)
document.addEventListener('paste', function(e){
  var items = (e.clipboardData||e.originalEvent&&e.originalEvent.clipboardData||{items:[]}).items||[];
  var imgFile=null;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){ imgFile=items[i].getAsFile(); break; }
  }
  if(!imgFile) return;
  if(S.editMode && S.editData){
    editScanImg({files:[imgFile]});
    return;
  }
  if(S.showAdd && S.addStep==='upload'){
    parseImg(imgFile);
  }
});
</script>
