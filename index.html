body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--t1);}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);}
@media(min-width:768px){
  body{background:#2a1a0c;}

  .bnav{border-radius:0 0 24px 24px;}
}
.bebas{font-family:'Cardo',serif;font-weight:700;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.cani{animation:fadeUp .28s ease both;}
.fchip{transition:transform .15s;cursor:default;}.fchip:hover{transform:scale(1.06);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(8px);}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:28px 22px 40px;max-height:90vh;overflow-y:auto;}
.inp{width:100%;border:1px solid var(--ib);border-radius:12px;padding:11px 14px;font-size:14px;font-family:inherit;background:var(--ibg);color:var(--t1);outline:none;transition:border-color .15s;-webkit-appearance:none;box-sizing:border-box;}
.inp:focus{border-color:var(--ac);}
.lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:6px;margin-top:14px;}
.btnp{width:100%;background:var(--h1);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:18px;}
.btns{background:var(--card);color:var(--t2);border:1px solid var(--ib);border-radius:12px;padding:11px 18px;font-size:13px;font-family:inherit;cursor:pointer;}
.star{font-size:18px;cursor:pointer;color:rgba(42,26,12,0.15);transition:color .1s;display:inline-block;line-height:1;}.star.on{color:#b84830;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(244,236,224,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid rgba(42,26,12,0.12);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);max-width:480px;margin:0 auto;}
@media(min-width:768px){.bnav{left:50%;transform:translateX(-50%);right:auto;width:480px;border-radius:0 0 24px 24px;}}
.nbtn{flex:1;background:none;border:none;color:#a07858;padding:10px 0 13px;font-family:'Hahmlet',serif;font-size:8px;cursor:pointer;border-top:2px solid transparent;letter-spacing:1.5px;text-transform:uppercase;font-weight:300;}
.nbtn.on{color:#28160a;border-top-color:#b84830;font-weight:400;}
.dz{border:2px dashed var(--ib);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--ibg);transition:all .2s;}
.dz.over{border-color:var(--ac);background:var(--acs);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--h1);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
textarea.inp{resize:none;min-height:80px;}
</style>

function normalizeRecipe(r){
  if(!r) return {dripper:"",hot:{beans:"",grind:"",waterTemp:"",pour:""},iced:{beans:"",grind:"",waterTemp:"",pour:""}};
  // 이미 신규 구조 (hot이 object)

    var hotTemp=r.hot.waterTemp||"";
    var icedTemp=r.iced&&r.iced.waterTemp||"";
    // 한쪽에만 waterTemp 있으면 반대쪽에도 복사
    if(hotTemp && !icedTemp) icedTemp=hotTemp;
    if(icedTemp && !hotTemp) hotTemp=icedTemp;
    return {
      dripper:normDripper(r.dripper||""),
      hot:{beans:r.hot.beans||"",grind:r.hot.grind||"",waterTemp:hotTemp,pour:r.hot.pour||""},
      iced:{beans:r.iced&&r.iced.beans||"",grind:r.iced&&r.iced.grind||"",waterTemp:icedTemp,pour:r.iced&&r.iced.pour||""}
    };
  }
  // 구버전 → 신규로 변환 (waterTemp 공통 필드라 둘 다 동일하게)
  return {
    dripper:normDripper(r.dripper||""),

}

function getDegasDays(roastLevel){

// 오늘 기준 디개싱 상태 계산
// 반환: {status:"degassing"|"ready"|"none", daysSince:N, degasEndDate:"YYYY-MM-DD", remaining:N}
function getDegasInfo(b){
  var roastDate = b.degasDate || b.roastDate; // degasDate 수동 설정 우선
  if(!roastDate) return {status:"none"};
  var roast = new Date(roastDate);
  var today = new Date(new Date().toISOString().slice(0,10));
  var daysSince = Math.floor((today - roast) / 86400000);
  var totalDays = b.degasDays != null ? b.degasDays : getDegasDays(b.roastLevel);
  var degasEndDate = new Date(roast.getTime() + totalDays * 86400000).toISOString().slice(0,10);
  if(daysSince < 0) return {status:"none"}; // 로스팅 전
  if(daysSince < totalDays){
    return {status:"degassing", daysSince:daysSince, degasEndDate:degasEndDate, remaining:totalDays-daysSince, totalDays:totalDays};
  }
  return {status:"ready", daysSince:daysSince, degasEndDate:degasEndDate, totalDays:totalDays};
}

function getFlavorColor(name){
  if(!name) return "#b89070";
  var lo=name.toLowerCase();
  for(var i=0;i<FLAVOR_COLOR.length;i++){
    var fc=FLAVOR_COLOR[i];
    for(var j=0;j<fc.keys.length;j++){
      if(lo.indexOf(fc.keys[j])!==-1) return fc.c;
    }
  }
  return "#b89070";
}

function getFlavorGradient(flavors){
  if(!flavors||!flavors.length) return null;
  var colors=flavors.map(function(f){return getFlavorColor(f);});
  if(colors.length===1) return colors[0]+' 0%, '+colors[0]+' 100%';
  return colors.map(function(c,i){return c+' '+(i/(colors.length-1)*100).toFixed(0)+'%';}).join(', ');
}

function getFlavorBg(flavors){
  if(!flavors||!flavors.length) return null;
  var grad=getFlavorGradient(flavors);
  if(!grad) return null;
  return {grad:grad, c1:getFlavorColor(flavors[0]), c2:getFlavorColor(flavors[flavors.length-1])};
}

// ── [수정] streak 계산을 렌더 외부에서 캐싱
function calcStreak(ds){
  var streak=0, dd=new Date();
  while(true){
    var dateStr=dd.toISOString().slice(0,10);
    if(ds.find(function(x){return x.date===dateStr;})){streak++;dd.setDate(dd.getDate()-1);}
    else break;
  }
  return streak;
}

function fchips(flavors,sz){
  if(!flavors||!flavors.length) return "";
  var isSmall=sz==="small";
  var boxSz=isSmall?17:24;
  var imgSz=isSmall?14:20;
  var emoFont=isSmall?"13px":"20px";
  var txtSz=isSmall?"9px":"10px";
  var pad=isSmall?"5px 4px":"8px 5px";
  var chipH=isSmall?'auto':'60px';
  var bigIcons={'hongsi':0.85,'nuts':1,'caramel':1};
  var grad=getFlavorGradient(flavors);
  var barHtml=grad?'<div style="height:'+(isSmall?'3px':'4px')+';border-radius:2px;margin-bottom:'+(isSmall?'8px':'10px')+';background:linear-gradient(90deg,'+grad+');">'+'</div>':"";
  var chips=flavors.map(function(f){
    var ico=fe(f);
    var icoHtml;
    if(ico.indexOf('__svg_')===0){
      var svgKey=ico.slice(6);
      var sz2=bigIcons[svgKey]?Math.round(imgSz*1.3):imgSz;
      var svgStr=getSvgIcon(svgKey,String(sz2));
      var wrap='<div style="width:'+boxSz+'px;height:'+boxSz+'px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:visible;">';
      icoHtml=wrap+(svgStr||'<span style="font-size:'+emoFont+';">✨</span>')+'</div>';
    } else {
      var wrap='<div style="width:'+boxSz+'px;height:'+boxSz+'px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">';
      icoHtml=wrap+'<span style="font-size:'+emoFont+';line-height:1;">'+ico+'</span></div>';
    }
    return '<div class="fchip" style="height:'+chipH+';display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:2px;background:#fffaf2;border:0.5px solid rgba(42,26,12,0.09);border-radius:10px;padding:'+pad+';">'  
      +icoHtml
      +'<span style="font-size:'+txtSz+';color:#7a4e2a;font-weight:300;text-align:center;width:100%;word-break:keep-all;overflow-wrap:break-word;line-height:1.3;margin-top:auto;">'+f+'</span>'
      +'</div>';
  }).join("");
  return barHtml+'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;">'+chips+'</div>';
}
function getSvgIcon(k,sz){var t=SVG_ICONS[k];return t?t.replace(/SZ/g,sz):null;}
function stHtml(v,id,sz,ed){
  return [1,2,3,4,5].map(function(s){return '<span class="star'+(s<=v?" on":"")+'" style="font-size:'+(sz||16)+'px;" '+(ed?'onclick="setStar(\''+id+'\','+s+')"':'')+'>★</span>';}).join("");
}

window.editScanImg = async function(input){
  var file=input.files[0]; if(!file) return;
  S.editScanState="scanning"; render();
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
    var resp=await fetch(WK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},{type:"text",text:PARSE_PROMPT}]}]})});
    var data=await resp.json();
    if(!resp.ok) throw new Error("API "+resp.status);
    var txt=data.content.map(function(c){return c.text||"";}).join("");
    var parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
    var nr=normalizeRecipe(parsed.recipe);
    // 파싱 결과를 editData에 병합 (id, status, guestNotes 등 메타 필드는 유지)
    var fields=["name","roaster","origin","region","producer","variety","altitude","process","roastLevel","tagline"];
    fields.forEach(function(k){ if(parsed[k]!==undefined&&parsed[k]!=="") S.editData[k]=k==="roastLevel"?normRL(parsed[k])||parsed[k]:k==="process"?normProcess(parsed[k])||parsed[k]:parsed[k]; });
    if(parsed.flavor&&parsed.flavor.length) S.editData.flavor=Array.isArray(parsed.flavor)?parsed.flavor.join(", "):parsed.flavor;
    S.editData.rDripper=nr.dripper||S.editData.rDripper;
    if(nr.hot.pour){ S.editData.rHotBeans=nr.hot.beans; S.editData.rHotGrind=nr.hot.grind; S.editData.rHotTemp=nr.hot.waterTemp; S.editData.rHotPour=nr.hot.pour; }
    if(nr.iced.pour){ S.editData.rIcedBeans=nr.iced.beans; S.editData.rIcedGrind=nr.iced.grind; S.editData.rIcedTemp=nr.iced.waterTemp; S.editData.rIcedPour=nr.iced.pour; }
    S.editScanState="idle";
    showToast("이미지 파싱 완료 ✅ 확인 후 저장해주세요");
  } catch(err){
    console.error(err);
    S.editScanState="idle";
    showToast("파싱 실패 😔 다시 시도해주세요");

  }

    var b=beans.find(function(x){return x.id===id;});if(!b)return;
    var dg=getDegasInfo(b);
    S.degasEdit={
      id:id,
      degasDate:b.degasDate||b.roastDate||"",
      degasDays:b.degasDays!=null?b.degasDays:getDegasDays(b.roastLevel)
    };
    S.showDegasEdit=true;
    render();
  });
};
window.closeDegasEdit = function(){S.showDegasEdit=false;S.degasEdit=null;render();};
window.degasInput = function(k,v){if(S.degasEdit)S.degasEdit[k]=v;};
window.saveDegasEdit = async function(){
  var e=S.degasEdit;if(!e)return;
  var upd={};
  if(e.degasDate) upd.degasDate=e.degasDate;
  if(e.degasDays) upd.degasDays=parseInt(e.degasDays)||getDegasDays("");
  await fuB(e.id,upd);
  S.showDegasEdit=false;S.degasEdit=null;
  showToast("디개싱 설정이 저장됐어요 🫧");
};
window.resetDegasEdit = async function(){
  var e=S.degasEdit;if(!e)return;
  await fuB(e.id,{degasDate:null,degasDays:null});
  S.showDegasEdit=false;S.degasEdit=null;
  showToast("자동 계산으로 초기화됐어요");
};

async function parseImg(file){
  S.addStep="parsing";S.addPreview=URL.createObjectURL(file);render();
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
    var resp=await fetch(WK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},{type:"text",text:PARSE_PROMPT}]}]})})
    var data=await resp.json();
    if(!resp.ok)throw new Error("API "+resp.status);
    var txt=data.content.map(function(c){return c.text||"";}).join("");
    var parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
    var nr=normalizeRecipe(parsed.recipe);
    S.addEdit=Object.assign({},parsed,{
      flavor:Array.isArray(parsed.flavor)?parsed.flavor.join(", "):(parsed.flavor||""),
      roaster:parsed.roaster||"",myNote:"",rating:4,status:"available",roastDate:"",startDate:"",
      process:normProcess(parsed.process)||parsed.process||"",
      roastLevel:normRL(parsed.roastLevel)||parsed.roastLevel||"",
      rDripper:nr.dripper,
      rHotBeans:nr.hot.beans,rHotGrind:nr.hot.grind,rHotTemp:nr.hot.waterTemp,rHotPour:nr.hot.pour,
      rIcedBeans:nr.iced.beans,rIcedGrind:nr.iced.grind,rIcedTemp:nr.iced.waterTemp,rIcedPour:nr.iced.pour
    });
    S.addStep="review";render();
  }catch(err){console.error(err);S.addStep="error";render();}
}

function mkRL(val,fn){
  var levels=["라이트","미디엄라이트","미디엄","미디엄다크","다크"];

    +keys.map(function(k){return '<option value="'+k+'"'+(norm===k?' selected':'')+'>'+(k||'선택 안함')+'</option>';}).join('')
    +'</select>';

      return '<button onclick="adminTab(\''+t[0]+'\')" style="flex:1;padding:9px 4px;border-radius:12px;border:'+(on?'none':'1px solid rgba(42,26,12,0.15)')+';background:'+(on?'#2a1a0c':'#fff')+';color:'+(on?'#fff':'#7a4e2a')+';font-size:11px;font-family:inherit;font-weight:'+(on?'700':'400')+';cursor:pointer;">'+t[1]+'</button>';
    }).join("")
    +'</div>'

    +'<div style="padding:16px 16px 40px;">';

  // ── 디개싱 탭
  if(at==="degas"){
    body+='<p style="'+SEC_LBL+'">배전도별 기본 디개싱 기간</p>'
      +'<div style="'+CARD+'">';
    roastLevels.forEach(function(rl, i){
      var days=settings.degasDays[rl]||DEFAULT_SETTINGS.degasDays[rl]||8;
      var isLast=(i===roastLevels.length-1);
      body+='<div style="'+(isLast?ROWLAST:ROW)+'">'
        +'<div>'
        +'<div style="font-size:14px;color:#28160a;font-weight:500;">'+rl+'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<button onclick="adminDegasDec(\''+rl+'\')" style="width:30px;height:30px;border-radius:8px;border:1px solid rgba(42,26,12,0.15);background:#f4ece0;font-size:16px;cursor:pointer;font-family:inherit;color:#28160a;display:flex;align-items:center;justify-content:center;">−</button>'
        +'<span style="font-size:16px;font-weight:700;color:#28160a;min-width:28px;text-align:center;" id="dd-'+rl+'">'+days+'</span>'
        +'<button onclick="adminDegasInc(\''+rl+'\')" style="width:30px;height:30px;border-radius:8px;border:1px solid rgba(42,26,12,0.15);background:#f4ece0;font-size:16px;cursor:pointer;font-family:inherit;color:#28160a;display:flex;align-items:center;justify-content:center;">+</button>'
        +'<span style="font-size:12px;color:#b89070;min-width:14px;">일</span>'
        +'</div>'
        +'</div>';
    });
    body+='</div>'
      +'<button onclick="saveAdminDegas()" style="width:100%;background:#2a1a0c;color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">저장하기</button>';
  }

  // ── 동작 탭
  if(at==="behavior"){
    body+='<p style="'+SEC_LBL+'">디개싱 동작 설정</p>'
      +'<div style="'+CARD+'">'
      +'<div style="'+ROW+'">'
      +'<div>'
      +'<div style="font-size:14px;color:#28160a;font-weight:500;">메뉴판에서 숨기기</div>'
      +'<div style="font-size:12px;color:#b89070;margin-top:2px;">BEAN LINEUP에 디개싱 원두 미표시</div>'
      +'</div>'
      +mkToggle(settings.degasHideMenu,"adminToggle(\'degasHideMenu\')")
      +'</div>'
      +'<div style="'+ROWLAST+'">'
      +'<div>'
      +'<div style="font-size:14px;color:#28160a;font-weight:500;">일기 원두 선택 제외</div>'
      +'<div style="font-size:12px;color:#b89070;margin-top:2px;">커피 일기 작성 시 디개싱 원두 선택 불가</div>'
      +'</div>'
      +mkToggle(settings.degasHideDiary,"adminToggle(\'degasHideDiary\')")
      +'</div>'
      +'</div>'
      +'<button onclick="saveAdminBehavior()" style="width:100%;background:#2a1a0c;color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">저장하기</button>';
  }

  // ── 데이터 탭
  if(at==="data"){
    var settingsJson=JSON.stringify(settings,null,2);
    var migState=S.migrateState||"idle"; // idle | running | done | error
    body+='<p style="'+SEC_LBL+'">원두 데이터 정규화</p>'
      +'<div style="'+CARD+'">'
      +'<div style="'+ROW+'">'
      +'<div>'
      +'<div style="font-size:14px;color:#28160a;font-weight:500;">배전도 + 레시피 일괄 정규화</div>'
      +'<div style="font-size:12px;color:#b89070;margin-top:2px;">중약배전→미디엄라이트, 구버전 recipe→신규 구조 변환</div>'
      +'</div>'
      +(migState==="running"
        ? '<div style="font-size:12px;color:#b89070;">처리 중...</div>'
        : migState==="done"
          ? '<div style="font-size:12px;color:#166534;font-weight:600;">✅ 완료</div>'
          : migState==="error"
            ? '<div style="font-size:12px;color:#ff3b30;font-weight:600;">오류 발생</div>'
            : '<button onclick="migrateAllBeans()" style="background:#f0fdf4;color:#166534;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;">정규화 실행</button>'
      )
      +'</div>'
      +(S.migrateLog?'<div style="padding:10px 16px 12px;font-size:11px;color:#b89070;border-top:0.5px solid rgba(0,0,0,0.06);line-height:1.8;">'+esc(S.migrateLog)+'</div>':"")
      +'</div>'
      +'<p style="'+SEC_LBL+'margin-top:16px;">설정 관리</p>'
      +'<div style="'+CARD+'">'
      +'<div style="'+ROW+'">'
      +'<div>'
      +'<div style="font-size:14px;color:#28160a;font-weight:500;">현재 설정 내보내기</div>'
      +'<div style="font-size:12px;color:#b89070;margin-top:2px;">JSON 파일로 백업</div>'
      +'</div>'
      +'<button onclick="exportAdminSettings()" style="background:#eff6ff;color:#1d4ed8;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;">내보내기</button>'
      +'</div>'
      +'<div style="'+ROWLAST+'">'
      +'<div>'
      +'<div style="font-size:14px;color:#28160a;font-weight:500;">설정 초기화</div>'
      +'<div style="font-size:12px;color:#b89070;margin-top:2px;">모든 설정을 기본값으로 되돌리기</div>'
      +'</div>'
      +'<button onclick="resetAdminSettings()" style="background:#fff0f0;color:#ff3b30;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;">초기화</button>'
      +'</div>'
      +'</div>'
      +'<p style="'+SEC_LBL+'margin-top:8px;">현재 설정값</p>'
      +'<div style="background:#28160a;border-radius:14px;padding:14px 16px;overflow-x:auto;">'
      +'<pre style="font-family:monospace;font-size:11px;color:#a8ff78;line-height:1.7;margin:0;white-space:pre-wrap;">'+esc(settingsJson)+'</pre>'
      +'</div>';
  }

  body+='</div></div></div>';
  return body;
}

// ── 관리 페이지 핸들러
var navLongT=null;
window.navLongStart=function(e){
  navLongT=setTimeout(function(){
    e.preventDefault();
    openAdmin();
  },600);
};
window.navLongEnd=function(){
  if(navLongT){clearTimeout(navLongT);navLongT=null;}
};
window.titleTap=function(){
  S.titleTap=(S.titleTap||0)+1;
  if(S.titleTapT) clearTimeout(S.titleTapT);
  if(S.titleTap>=5){S.titleTap=0;openAdmin();return;}
  S.titleTapT=setTimeout(function(){S.titleTap=0;},2000);
};
window.openAdmin=function(){
  requirePw(function(){S.showAdmin=true;S.adminTab="degas";render();});
};
window.closeAdmin=function(){S.showAdmin=false;render();};
window.adminTab=function(t){S.adminTab=t;render();};
window.adminDegasDec=function(rl){
  var cur=settings.degasDays[rl]||DEFAULT_SETTINGS.degasDays[rl]||8;
  if(cur<=1)return;
  settings.degasDays[rl]=cur-1;render();
};
window.adminDegasInc=function(rl){
  var cur=settings.degasDays[rl]||DEFAULT_SETTINGS.degasDays[rl]||8;
  if(cur>=30)return;
  settings.degasDays[rl]=cur+1;render();
};
window.adminToggle=function(key){
  settings[key]=!settings[key];render();
};
window.saveAdminDegas=async function(){
  await setDoc(SC,{degasDays:Object.assign({},settings.degasDays)},{merge:true});
  showToast("디개싱 기간이 저장됐어요 🫧");
};
window.saveAdminBehavior=async function(){
  await setDoc(SC,{degasHideMenu:!!settings.degasHideMenu,degasHideDiary:!!settings.degasHideDiary},{merge:true});
  showToast("동작 설정이 저장됐어요 ✅");
};
window.migrateAllBeans=async function(){
  if(!confirm('전체 원두 데이터를 정규화할까요?\n배전도(중약배전→미디엄라이트 등)와 레시피 구조를 일괄 변환합니다.')) return;
  S.migrateState="running"; S.migrateLog=""; render();
  var total=beans.length, done=0, skipped=0, errors=0;
  for(var i=0;i<beans.length;i++){
    var b=beans[i];
    try{
      var newRL=normRL(b.roastLevel);
      var newProcess=normProcess(b.process);
      var newRecipe=normalizeRecipe(b.recipe);
      var changed=false;
      var upd={};
      if(newRL && newRL!==b.roastLevel){upd.roastLevel=newRL; changed=true;}
      if(newProcess && newProcess!==b.process){upd.process=newProcess; changed=true;}
      var isOldRecipe=b.recipe&&(typeof b.recipe.hot==="string"||b.recipe.beans!==undefined);
      if(isOldRecipe){upd.recipe=newRecipe; changed=true;}
      if(changed){
        await fuB(b.id,upd);
        done++;
      } else {
        skipped++;
      }
    } catch(e){
      errors++;
    }
  }
  S.migrateState="done";
  S.migrateLog=total+'개 원두 처리 완료 — 변환: '+done+'개 / 이미 최신: '+skipped+'개'+(errors?(' / 오류: '+errors+'개'):'');
  render();
  showToast('정규화 완료 ✅ '+done+'개 변환');
};
window.exportAdminSettings=function(){
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="ozy-settings-"+new Date().toISOString().slice(0,10)+".json";
  a.click();showToast("설정 파일을 내보냈어요 📁");
};
window.resetAdminSettings=async function(){
  if(!confirm("모든 설정을 기본값으로 초기화할까요?"))return;
  await setDoc(SC,Object.assign({},DEFAULT_SETTINGS,{degasDays:Object.assign({},DEFAULT_SETTINGS.degasDays)}));
  showToast("기본값으로 초기화됐어요");
};


function rPw(){
  return '<div class="mbg" style="align-items:center;justify-content:center;" onclick="if(event.target===this)closePw()">'
    +'<div style="background:#fff;border-radius:22px;width:calc(100% - 48px);max-width:320px;padding:28px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">'
    +'<div style="font-size:32px;margin-bottom:12px;">🔐</div>'
    +'<div style="font-size:17px;font-weight:700;color:#28160a;margin-bottom:6px;">관리자 확인</div>'
    +'<div style="font-size:13px;color:#b89070;margin-bottom:20px;">비밀번호를 입력해주세요</div>'
    +'<input id="pw-inp" type="password" placeholder="비밀번호" style="width:100%;border:'+(S.pwErr?"2px solid #ff3b30":"1px solid rgba(42,26,12,0.15)")+';border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;background:#f4ece0;color:#28160a;outline:none;text-align:center;letter-spacing:4px;box-sizing:border-box;" onkeydown="if(event.key===\'Enter\')submitPw()">'
    +(S.pwErr?'<div style="font-size:12px;color:#ff3b30;margin-top:8px;">비밀번호가 맞지 않아요</div>':"")
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closePw()" style="flex:1;background:#f4ece0;color:#7a4e2a;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;cursor:pointer;">취소</button>'
    +'<button onclick="submitPw()" style="flex:1;background:#2a1a0c;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;">확인</button>'
    +'</div></div></div>';
}

function rNav(){
  return '<div class="bnav">'+[["menu","Lineup",""],["archive","Archive",""],["diary","Diary",""]].map(function(x){
    return '<button class="nbtn'+(S.tab===x[0]?" on":"")+'" onclick="setTab(\''+x[0]+'\')" oncontextmenu="event.preventDefault();openAdmin()" ontouchstart="navLongStart(event)" ontouchend="navLongEnd()" ontouchcancel="navLongEnd()"><div style="font-size:20px;margin-bottom:2px;">'+x[2]+'</div>'+x[1]+'</button>';
  }).join("")+'</div>';
}

function render(){
  var body="";
  if(S.detail) body=rDetail(S.detail);
  else if(S.tab==="menu") body=rMenu();
  else if(S.tab==="diary") body=rDiary();
  else body=rArchive();
  document.getElementById("app").innerHTML=
    body+rNav()
    +(S.showAdd?rAdd():"")
    +(S.guestId?rGuest():"")
    +(S.showDiary?rDiaryModal():"")
    +(S.showPw?rPw():"")
    +(S.showDegasEdit?rDegasModal():"")
    +(S.showAdmin?rAdmin():"")
    +(S.toast?'<div class="toast">'+S.toast+'</div>':"");
}
render();

// ── History API — SPA 뒤로가기 처리
function getHistoryState(){
  return {tab:S.tab, detail:S.detail};
}
function pushHistory(){
  history.pushState(getHistoryState(), "");
}
// 초기 상태 replace (첫 진입 시 스택 기준점)
history.replaceState(getHistoryState(), "");

window.addEventListener('popstate', function(e){
  var state = e.state;
  if(!state) return;
  // 모달 열려있으면 모달만 닫기
  if(S.showAdd||S.showDiary||S.showPw||S.showDegasEdit||S.guestId||S.showAdmin){
    S.showAdd=false;S.showDiary=false;S.showPw=false;S.showDegasEdit=false;S.guestId=null;S.showAdmin=false;
    S.pwAction=null;S.pwErr=false;
    history.pushState(getHistoryState(),"");
    render();
    return;
  }
  // 상세 페이지 → 목록으로
  if(S.detail && !state.detail){
    S.detail=null;S.editMode=false;render();return;
  }
  // 탭 전환
  S.tab=state.tab||"menu";
  S.detail=state.detail||null;
  S.editMode=false;
  render();
});

// [수정] paste 이벤트 단일 등록 (window.handlePaste 제거 후 여기서만 처리)
document.addEventListener('paste', function(e){
  var items = (e.clipboardData||e.originalEvent&&e.originalEvent.clipboardData||{items:[]}).items||[];
  var imgFile=null;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){ imgFile=items[i].getAsFile(); break; }
  }
  if(!imgFile) return;
  if(S.editMode && S.editData){
    editScanImg({files:[imgFile]});
    return;
  }
  if(S.showAdd && S.addStep==='upload'){
    parseImg(imgFile);
  }
});
</script>
